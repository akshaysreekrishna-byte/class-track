        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

      min-height: max(884px, 100dvh);

<body class="font-body-md text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-16 bg-surface dark:bg-gray-900 docked full-width top-0 border-b border-gray-200 dark:border-gray-800 shadow-sm sticky z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A professional and clean close-up portrait of a young university student in a bright, modern campus setting. The lighting is natural and soft, emphasizing a sense of academic focus and reliability. The overall aesthetic is high-key and minimalist, matching a light-mode corporate UI with soft purple and lavender tones in the background architecture." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLthIFBsqYdrHiq0j7yQjpzgnp3nPFH3XgO9VFr5eDGR1bFF3qGzgTRoskf7Q8L7co_92OIKiqdCFOoYywAslHSEay4ex3MVfEYk7F5R5zkAIMGIZ6zQV52822Eg8EVZbgGwnKnSy19taVnVtED22eDrKtcNWVZ8rP95HsLfTTgMEqtN7cPfJXPjzLIlEDc83-dNnR8bLHZo9CI87PaTlw3PM3e06IuH5_bbDym9W49QsLcmr2R35ORt8oId3UNvBISEZSdeNWY0M"/>
</div>
<h1 class="font-['Lexend'] text-lg font-semibold tracking-tight text-[#6750A4] dark:text-[#D0BCFF]">Class Tracker</h1>
</div>
</header>
<main class="px-gutter pt-lg flex flex-col gap-lg">
<!-- Header Section -->
<section class="flex flex-col gap-xs">
<h2 class="font-headline-md text-headline-md text-on-surface">Manage Subjects</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Track and organize your academic curriculum.</p>
</section>
<!-- Bento Grid Layout for Subjects -->
<div class="grid grid-cols-1 gap-md">
<!-- Subject Card: Data Structures -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm transition-transform active:scale-[0.98] relative overflow-hidden group">
<div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
<div class="flex justify-between items-start">
<div class="flex flex-col gap-xs">
<span class="bg-primary-fixed text-on-primary-fixed-variant px-sm py-0.5 rounded-full font-label-sm text-label-sm w-fit">Theory</span>
<h3 class="font-title-lg text-title-lg text-on-surface">Data Structures</h3>
</div>
<div class="flex gap-1">
<button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">edit</button>
<button class="material-symbols-outlined p-2 text-error hover:bg-error-container rounded-full transition-colors">delete</button>
</div>
</div>
</div>
<!-- Subject Card: OS Lab (Asymmetric Highlight) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm transition-transform active:scale-[0.98] relative overflow-hidden group">
<div class="absolute top-0 left-0 w-1 h-full bg-secondary"></div>
<div class="flex justify-between items-start">
<div class="flex flex-col gap-xs">
<span class="bg-secondary-container text-on-secondary-container px-sm py-0.5 rounded-full font-label-sm text-label-sm w-fit">Lab</span>
<h3 class="font-title-lg text-title-lg text-on-surface">OS Lab</h3>
</div>
<div class="flex gap-1">
<button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">edit</button>
<button class="material-symbols-outlined p-2 text-error hover:bg-error-container rounded-full transition-colors">delete</button>
</div>
</div>
</div>
<!-- Subject Card: Computer Networks -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-sm transition-transform active:scale-[0.98] relative overflow-hidden group">
<div class="absolute top-0 left-0 w-1 h-full bg-tertiary"></div>
<div class="flex justify-between items-start">
<div class="flex flex-col gap-xs">
<span class="bg-tertiary-fixed text-on-tertiary-fixed-variant px-sm py-0.5 rounded-full font-label-sm text-label-sm w-fit">Theory</span>
<h3 class="font-title-lg text-title-lg text-on-surface">Computer Networks</h3>
</div>
<div class="flex gap-1">
<button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors">edit</button>
<button class="material-symbols-outlined p-2 text-error hover:bg-error-container rounded-full transition-colors">delete</button>
</div>
</div>
</div>
</div>
<!-- Subject Overview Stats (Bento Element) -->
</main>
<!-- FAB: Add Subject -->
<button class="fixed bottom-28 right-6 bg-primary-container text-on-primary-container shadow-lg hover:shadow-xl transition-all duration-300 active:scale-90 flex items-center gap-2 px-6 py-4 rounded-2xl z-40">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
<span class="font-label-lg text-label-lg">Add Subject</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/95 dark:bg-gray-950/95 backdrop-blur-md z-50 border-t border-gray-100 dark:border-gray-800 shadow-[0_-1px_3px_rgba(0,0,0,0.05)]">
<!-- Dashboard -->
<a class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 py-1 hover:text-[#6750A4] dark:hover:text-[#D0BCFF] scale-95 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Lexend'] text-[12px] font-medium mt-1">Dashboard</span>
</a>
<!-- Calendar -->
<a class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 py-1 hover:text-[#6750A4] dark:hover:text-[#D0BCFF] scale-95 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-['Lexend'] text-[12px] font-medium mt-1">Calendar</span>
</a>
<!-- Subjects (Active) -->
<a class="flex flex-col items-center justify-center bg-[#EADDFF] dark:bg-[#4F378B] text-[#21005D] dark:text-[#EADDFF] rounded-2xl px-5 py-1 scale-95 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="font-['Lexend'] text-[12px] font-medium mt-1">Subjects</span>
</a>
</nav>
